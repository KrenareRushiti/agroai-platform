services:
  # Backend Server
  - type: web
    name: agroai-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Client (Static Site)
  - type: static
    name: agroai-client
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
