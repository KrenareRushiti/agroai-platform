services:
  # Backend Server
  - type: web
    name: agroai-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Client (Static Site)
  - type: web
    name: agroai-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://agroai-server.onrender.com # Kjo do të duhet të përditësohet pas deployment
